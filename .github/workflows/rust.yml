name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check
        env:
          KERNEL_JAM_PATH: /tmp/dummy.jam
        run: |
          printf '\x00' > /tmp/dummy.jam || true
          cargo +nightly check --all-targets --verbose

  build:
    name: cargo build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Download latest wallet kernel
        run: |
          set -euo pipefail
          ASSET_URL=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/nockchain/nockchain/releases/latest \
            | jq -r '.assets[] | select(.name == "nockchain-wallet-x86_64-unknown-linux-gnu.tar.gz") | .browser_download_url')
          curl -sL "$ASSET_URL" -o /tmp/nockchain-wallet.tar.gz
          mkdir -p /tmp/kernel
          tar -xzf /tmp/nockchain-wallet.tar.gz -C /tmp/kernel
          JAM_PATH=$(find /tmp/kernel -name '*.jam' | head -n1)
          if [ -z "$JAM_PATH" ]; then
            echo "No .jam file found in wallet tarball" >&2
            exit 1
          fi
          cp "$JAM_PATH" /tmp/wal.jam
          echo "KERNEL_JAM_PATH=/tmp/wal.jam" >> "$GITHUB_ENV"
          echo "Using kernel: $JAM_PATH"

      - name: Build
        run: cargo +nightly build --verbose

  test:
    name: cargo test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Download latest wallet kernel
        run: |
          set -euo pipefail
          ASSET_URL=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/nockchain/nockchain/releases/latest \
            | jq -r '.assets[] | select(.name == "nockchain-wallet-x86_64-unknown-linux-gnu.tar.gz") | .browser_download_url')
          curl -sL "$ASSET_URL" -o /tmp/nockchain-wallet.tar.gz
          mkdir -p /tmp/kernel
          tar -xzf /tmp/nockchain-wallet.tar.gz -C /tmp/kernel
          JAM_PATH=$(find /tmp/kernel -name '*.jam' | head -n1)
          if [ -z "$JAM_PATH" ]; then
            echo "No .jam file found in wallet tarball" >&2
            exit 1
          fi
          cp "$JAM_PATH" /tmp/wal.jam
          echo "KERNEL_JAM_PATH=/tmp/wal.jam" >> "$GITHUB_ENV"
          echo "Using kernel: $JAM_PATH"

      - name: Test
        run: cargo +nightly test --verbose
