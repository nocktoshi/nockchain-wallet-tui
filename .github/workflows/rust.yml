name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check
        env:
          KERNEL_JAM_PATH: /tmp/dummy.jam
        run: |
          printf '\x00' > /tmp/dummy.jam || true
          cargo +nightly check --all-targets --verbose

  build:
    name: cargo build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          KERNEL_JAM_PATH: ${{ secrets.KERNEL_JAM_PATH }}
        run: cargo +nightly build --verbose

  test:
    name: cargo test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Test
        env:
          KERNEL_JAM_PATH: ${{ secrets.KERNEL_JAM_PATH }}
        run: cargo +nightly test --verbose
